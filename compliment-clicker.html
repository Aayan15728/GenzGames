<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>The Complement Button – Roast Edition</title>
    <link rel="stylesheet" href="compliment-clicker.css">
    <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Poppins:wght@400;600;700&display=swap"
        rel="stylesheet">
    <script async data-ad-frequency-hint="30s" data-adbreak-test="on"
        src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-370961836"
        crossorigin="anonymous">
        </script>
    <script>
        window.adsbygoogle = window.adsbygoogle || [];
        var adBreak = adConfig = function (o) { adsbygoogle.push(o); }
    </script>
</head>

<body>
    <header class="main-header">
        <a href="/">
            <img src="Capture.PNG" alt="Game Icon" id="game-icon" class="game-icon">
        </a>

    </header>
    <main>
        <h1 class="title centered-title">The Complement Button</h1>
        <div class="game-container">
            <div id="roast-container">
                <span id="roast-text"></span>
            </div>
            <button id="clickerBtn" class="click-button">Click Me</button>
            <p id="click-counter" class="counter-text">You have clicked the button <span id="count">0</span> many times
            </p>

        </div>
    </main>
    <script src="compliment-clicker.js"></script>
</body>

</html>
